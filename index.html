    <script>
      // SPA redirect decoder pro GitHub Pages (spa-github-pages). Musí běžet
      // PŘED načtením Reactu, aby BrowserRouter viděl správné location.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
