<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <title>Petr Slavík</title>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License — https://github.com/rafgraph/spa-github-pages
      // Přesměruje jakoukoliv cestu na index.html a zachová ji v query stringu,
      // kde ji v index.html dekódujeme zpět do history.
      var pathSegmentsToKeep = 1; // /petrslavikweb/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
